sources:
  - name: clmm-v2-insights
    priority: critical
    type: internal-api
    env: CLMM_DATA_API_BASE
    apiKeyEnv: CLMM_INSIGHTS_API_KEY
    endpoint: /insights/sol-usdc/bundle/:walletId
    purpose:
      - full_bundle
      - pool_data
      - positions
      - support_resistance
      - alerts
      - data_quality

  - name: raydium-sol-usdc
    priority: critical
    type: sdk-or-api
    env: RAYDIUM_POOL_ID
    purpose:
      - pool_liquidity
      - current_tick
      - tick_liquidity_distribution
      - fee_apr
      - volume

  - name: pyth-hermes
    priority: high
    type: authenticated-api
    env: PYTH_HERMES_BASE_URL
    apiKeyEnv: PYTH_API_KEY
    feedIdEnv: PYTH_SOL_USD_FEED_ID
    purpose:
      - oracle_price
      - price_sanity_check
    policy:
      timeoutMs: 5000
      maxAttempts: 2
    limitations:
      - Requires active feed subscription or hermes endpoint access.
      - Requires Pyth API key in production environment.

  - name: jupiter-quote
    priority: high
    type: public-api
    env: JUPITER_API_BASE
    apiKeyEnv: JUPITER_API_KEY
    purpose:
      - executable_quote
      - price_sanity_check
    policy:
      timeoutMs: 5000
      maxAttempts: 2
      slippageBps: 50
    limitations:
      - Slippage-sensitive (configured to 50 bps probe).
      - Jupiter API Key is required for high rate-limits in production.
      - Output amount is quote-relative. Freshness is 30 seconds receipt-relative (no wall-clock source timestamp).

  - name: defillama-solana
    priority: high
    type: public-api
    url: https://api.llama.fi
    purpose:
      - tvl
      - chain_fees
      - dex_volume
      - stablecoin_supply
      - app_revenue

  - name: coingecko-solana
    priority: medium
    type: public-api
    url: https://api.coingecko.com/api/v3
    purpose:
      - market_cap
      - historical_returns
      - broader_market_context

  - name: official-solana-updates
    priority: medium
    type: research-feed
    purpose:
      - network_upgrades
      - outage_or_degradation_risk
      - ecosystem_catalysts

  - name: helius-research
    priority: medium
    type: research-feed
    purpose:
      - ecosystem_context
      - infra_context
      - network_activity
